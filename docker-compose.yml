services:
  db:
    image: mariadb:10.11
    container_name: nextcloud_db
    restart: always
    volumes:
      - db_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}

  redis:
    image: redis:alpine
    container_name: nextcloud_redis
    restart: always

  app:
    image: nextcloud:31
    container_name: nextcloud_app
    restart: always
    ports:
      - 8080:80
    volumes:
      - nextcloud_data:/var/www/html/data
      - ./custom_apps:/var/www/html/custom_apps
      - ./themes:/var/www/html/themes
      - ./php.ini:/usr/local/etc/php/conf.d/uploads.ini
    env_file:
      - .env
    environment:
      - MYSQL_HOST=db
      - NEXTCLOUD_INSTANCE_ID=${NEXTCLOUD_INSTANCE_ID}
      - NEXTCLOUD_PASSWORD_SALT=${NEXTCLOUD_PASSWORD_SALT}
      - NEXTCLOUD_SECRET=${NEXTCLOUD_SECRET}
      - NEXTCLOUD_TALK_SECRET=${NEXTCLOUD_TALK_SECRET}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
    depends_on:
      - db
      - redis

  caddy:
    image: caddy:2
    container_name: nextcloud_caddy
    restart: always
    env_file:
      - .env
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  db_data:
  nextcloud_data:
  caddy_data:
  caddy_config:
